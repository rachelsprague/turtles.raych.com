<!DOCTYPE html>
<html lang="en">
  <head>
<!-- Google tag (gtag.js) -->
    {% if jekyll.environment == "production" %}
    <script>
    /* ---------------------------------
      Raych personal-traffic detection
    ---------------------------------- */

    // change this for each site
    const GA_ID = "G-7E6GMBJCZM";

    /* check if this browser is marked as Raych */
    const isRaych = document.cookie.includes("raychVisitor=true");

    /* OPTIONAL: disable GA entirely for you */
    if (isRaych) {
    //   window['ga-disable-' + GA_ID] = true;
    }

    /* if not disabling, at least tag yourself */
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}

    if (isRaych) {
      gtag('set', {
        'user_properties': {
          visitor_type: 'owner'
        }
      });
    }
    </script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7E6GMBJCZM"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-7E6GMBJCZM');
    </script>
    {% endif %}
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
  </head>
  <body style="background-color: #fff; color: #111; text-align: left; padding: 2rem;">
    <main style="max-width: 720px; margin: 0 auto;">
      <h1>{{ page.title }}</h1>
      <article>
        {{ content }}
      </article>
      <footer>
        &copy; {{ "now" | date: "%Y" }} Raych. <a href="/privacy">Privacy Policy</a>
      </footer>
    </main>
  </body>
</html>
