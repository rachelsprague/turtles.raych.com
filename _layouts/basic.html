<!DOCTYPE html>
<html lang="en">
  <head>
    
  <!-- Google tag (gtag.js) -->
  {% if jekyll.environment == "production" %}
  <script>
    // Your GA Measurement ID
    const GA_ID = "G-7E6GMBJCZM";

    // Detect if this is your browser (Raych)
    // For simplicity, we check a cookie; fallback to false
    const isRaych = document.cookie.includes("raychVisitor=true");

    // Initialize dataLayer
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}

    // Set traffic_type based on whether this is you
    gtag('set', 'user_properties', {
      traffic_type: isRaych ? 'owner' : 'user'
    });

    // Optional: completely disable tracking for yourself
    if (isRaych) {
      window['ga-disable-' + GA_ID] = true; 
    }

  </script>

  <!-- Load GA -->
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ GA_ID }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    // Configure GA
    gtag('config', '{{ GA_ID }}');
  </script>
  {% endif %}
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
  </head>
  <body style="background-color: #fff; color: #111; text-align: left; padding: 2rem;">
    <main style="max-width: 720px; margin: 0 auto;">
      <h1>{{ page.title }}</h1>
      <article>
        {{ content }}
      </article>
      <footer>
        &copy; {{ "now" | date: "%Y" }} Raych. <a href="/privacy">Privacy Policy</a>
      </footer>
    </main>
  </body>
</html>
