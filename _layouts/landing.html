<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- Google tag (gtag.js) -->
    {% if jekyll.environment == "production" %}
    <script>
    /* ---------------------------------
      Raych personal-traffic detection
    ---------------------------------- */

    // change this for each site
    const GA_ID = "G-7E6GMBJCZM";

    /* check if this browser is marked as Raych */
    const isRaych = document.cookie.includes("raychVisitor=true");

    /* OPTIONAL: disable GA entirely for you */
    if (isRaych) {
      window['ga-disable-' + GA_ID] = true;
    }

    /* if not disabling, at least tag yourself */
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}

    if (isRaych) {
      gtag('set', {
        'user_properties': {
          visitor_type: 'owner'
        }
      });
    }
    </script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7E6GMBJCZM"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-7E6GMBJCZM');
    </script>
    {% endif %}
    
</head>
<body class="{{ page.body_class }}">
  <main>
    {{ content }}
  </main>

  <footer style="text-align:center; font-size:0.9rem; color:#555; margin-top:3rem;">
    &copy; {{ "now" | date: "%Y" }} {% if site.title %}{{ site.title }}{% else %}Raych{% endif %} · 
    <a href="/privacy" style="color:#555; text-decoration:underline;">Privacy Policy</a>
  </footer>
    
</body>
</html>
